<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;display=swap');

        .container {
          margin: 0;
          width: 800px;
          height: 400px;
          display: flex;
          justify-content: center;
          align-items: center;
          background: radial-gradient(circle, #0a0f1c, #02040a);
          overflow: hidden;
          position: relative;
          font-family: 'Great Vibes', cursive;
        }

        .chip {
          position: absolute;
          width: 180px;
          height: 180px;
          border: 2px solid #ff7a00;
          box-shadow: 0 0 20px #ff7a00, 0 0 40px #ff4500;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .core {
          width: 60px;
          height: 60px;
          background: #ff7a00;
          border-radius: 50%;
          box-shadow: 0 0 20px #ff7a00, 0 0 40px #ff4500, 0 0 80px #ff2200;
          animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
          0% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.2); opacity: 0.6; }
          100% { transform: scale(1); opacity: 1; }
        }

        .line {
          position: absolute;
          width: 2px;
          height: 100%;
          background: linear-gradient(#ff7a00, transparent);
          animation: flow 3s linear infinite;
        }

        @keyframes flow {
          from { transform: translateY(-100%); }
          to { transform: translateY(100%); }
        }

        .name {
          position: relative;
          font-size: 60px;
          color:#f7faf8;
          white-space: nowrap;
          overflow: hidden;
          border-right: 4px solid #00ccff;
          width: 0;
          z-index: 2;
          text-shadow: 0 0 10px #00ccff, 0 0 20px #0099ff;
          animation: typing 4s steps(15, end) forwards, blink 0.8s infinite;
        }

        @keyframes typing {
          from { width: 0 }
          to { width: 15ch; }
        }

        @keyframes blink {
          50% { border-color: transparent; }
        }
      </style>

      <div class="container">
        <div class="line" style="left: 10%;"></div>
        <div class="line" style="left: 30%; animation-delay: 1s;"></div>
        <div class="line" style="left: 70%; animation-delay: 2s;"></div>
        <div class="line" style="left: 90%; animation-delay: 1.5s;"></div>
        
        <div class="chip">
          <div class="core"></div>
        </div>
        
        <div class="name">Bhagwan Solanke</div>
      </div>
    </div>
  </foreignObject>
</svg>
